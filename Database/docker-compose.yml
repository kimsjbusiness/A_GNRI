version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: agnri_postgres
    restart: always
    environment:
      
      POSTGRES_USER: dbadmin
      
      POSTGRES_DB: Main
      
      POSTGRES_PASSWORD: postgre0721!
    ports:
     
      - "25725:5432"
    volumes:
      - agnri_db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: agnri_pgadmin
    restart: always
    environment:
      
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: qlalfqjsgh1234
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  agnri_db_data: